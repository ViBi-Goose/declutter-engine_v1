<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Declutter Engine</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      line-height: 1.6;
    }
    #question-box {
      margin-top: 40px;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }
    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 16px;
      cursor: pointer;
    }
    #result {
      margin-top: 40px;
      padding: 20px;
      border: 2px solid #333;
      border-radius: 8px;
      background: #f7f7f7;
    }
  </style>
</head>

<body>

  <h1>Decluttering Decision Engine</h1>
  <p>Answer each question with Yes or No. Your final outcome will appear at the end.</p>

  <div id="question-box" style="display:none;">
    <h2 id="question-text"></h2>
    <button onclick="answer('yes')">Yes</button>
    <button onclick="answer('no')">No</button>
  </div>

  <div id="result" style="display:none;"></div>

  <script src="engine.js"></script>
  <script>
    let currentIndex = 0;
    let answers = {};

    async function start() {
      await window.declutterEngine.initEngine();
      showQuestion();
    }

    function showQuestion() {
      const q = window.declutterEngine.getQuestionById(currentIndex + 1);
      if (!q) {
        finish();
        return;
      }

      document.getElementById('question-text').textContent = q.text;
      document.getElementById('question-box').style.display = 'block';
    }

    function answer(value) {
      answers[String(currentIndex + 1)] = value;
      currentIndex++;
      showQuestion();
    }

    function finish() {
      const result = window.declutterEngine.evaluateAnswers(answers);

      const box = document.getElementById('result');
      box.style.display = 'block';

      if (!result) {
        box.innerHTML = `<h2>No outcome found.</h2>`;
        return;
      }

      const { outcome, matchedRule } = result;

      box.innerHTML = `
        <h2>Outcome: ${outcome.label}</h2>
        <p><strong>Category:</strong> ${outcome.category}</p>
        <p><strong>Description:</strong> ${outcome.description}</p>
        <hr>
        <p><strong>Matched Rule:</strong> ${matchedRule.rule_id}</p>
        <p><strong>Rule Notes:</strong> ${matchedRule.notes}</p>
      `;

      document.getElementById('question-box').style.display = 'none';
    }

    start();
  </script>

</body>
</html>
